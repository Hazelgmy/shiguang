<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>拾光 🌿</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap");

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #f7f3ee;
                --card: #efe9df;
                --card2: #e8e0d3;
                --text: #5c4e38;
                --text-muted: #9a876b;
                --accent: #8b7355;
                --accent-light: #d4c4ad;
                --border: rgba(139, 115, 85, 0.18);
                --border-mid: rgba(139, 115, 85, 0.32);
                --shadow: rgba(92, 78, 56, 0.08);
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
                min-height: 100vh;
            }

            /* ===== 密码锁 ===== */
            #lock-screen {
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse at 50% 35%, #fbf8f3 0%, #f3ede2 55%, #e8dfcf 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }

            .lock-card {
                background: #fffcf7;
                border: 1px solid rgba(139, 115, 85, 0.1);
                border-radius: 28px;
                padding: 3.2rem 2.6rem;
                width: 360px;
                text-align: center;
                box-shadow: 0 1px 2px rgba(92, 78, 56, 0.03), 0 8px 40px rgba(92, 78, 56, 0.05),
                    0 24px 80px rgba(92, 78, 56, 0.03);
            }

            .lock-botanical {
                margin-bottom: 0.8rem;
                opacity: 0.65;
            }

            .lock-botanical svg {
                display: block;
                margin: 0 auto;
            }

            .lock-title {
                font-family: "Playfair Display", "Noto Serif SC", "PingFang SC", serif;
                font-size: 2rem;
                font-weight: 500;
                color: #4a3a2c;
                letter-spacing: 0.1em;
                margin-bottom: 0.4rem;
            }

            .lock-sub {
                font-size: 0.88rem;
                color: #a6927b;
                font-weight: 400;
                letter-spacing: 0.05em;
                margin-bottom: 1.6rem;
            }

            .lock-divider {
                width: 36px;
                height: 1px;
                background: rgba(139, 115, 85, 0.22);
                margin: 0 auto 1.8rem;
            }

            .lock-input {
                width: 100%;
                padding: 0.8rem 1rem;
                border: 1px solid rgba(139, 115, 85, 0.18);
                border-radius: 12px;
                background: #fbfaf6;
                color: #4a3a2c;
                font-size: 0.95rem;
                outline: none;
                text-align: center;
                letter-spacing: 3px;
                transition: all 0.3s ease;
                margin-bottom: 1rem;
                font-family: inherit;
            }

            .lock-input:focus {
                border-color: rgba(139, 115, 85, 0.45);
                background: #fffcf7;
                box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.05);
            }

            .lock-input::placeholder {
                color: #c4b6a6;
                letter-spacing: 0.05em;
            }

            .lock-btn {
                width: 100%;
                padding: 0.8rem;
                background: #8b7355;
                color: #fffcf7;
                border: none;
                border-radius: 12px;
                font-size: 0.95rem;
                cursor: pointer;
                font-weight: 500;
                letter-spacing: 0.08em;
                transition: all 0.3s ease;
                font-family: inherit;
            }

            .lock-btn:hover {
                background: #7a6247;
                transform: translateY(-1px);
                box-shadow: 0 6px 24px rgba(139, 115, 85, 0.22);
            }

            .lock-btn:active {
                transform: translateY(0);
            }

            .lock-error {
                font-size: 0.8rem;
                color: #b55a5a;
                margin-top: 0.8rem;
                min-height: 1.2em;
                letter-spacing: 0.03em;
            }

            /* ===== 主界面 ===== */
            #app {
                display: none;
                min-height: 100vh;
            }

            .header {
                background: var(--card);
                border-bottom: 1px solid var(--border);
                padding: 0.9rem 1.5rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 100;
            }

            .header-title {
                font-size: 1.05rem;
                font-weight: 600;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 0.6rem;
            }

            .lock-exit {
                font-size: 0.8rem;
                color: var(--text-muted);
                cursor: pointer;
                padding: 0.3rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                background: transparent;
                transition: all 0.2s;
            }
            .lock-exit:hover {
                background: var(--card2);
                color: var(--text);
            }

            /* ===== 配置区 ===== */
            .config-bar {
                background: var(--card);
                border-bottom: 1px solid var(--border);
                padding: 0.7rem 1.5rem;
                display: flex;
                gap: 0.8rem;
                align-items: center;
                flex-wrap: wrap;
            }

            .config-label {
                font-size: 0.78rem;
                color: var(--text-muted);
                white-space: nowrap;
            }

            .config-input {
                flex: 1;
                min-width: 160px;
                padding: 0.4rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 7px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.82rem;
                outline: none;
            }

            .config-input:focus {
                border-color: var(--accent);
            }

            .config-status {
                font-size: 0.76rem;
                color: var(--text-muted);
                white-space: nowrap;
            }

            .config-status.ok {
                color: #7a9e6b;
            }
            .config-status.err {
                color: #b85c5c;
            }

            /* ===== 主体 ===== */
            .main-content {
                max-width: 900px;
                margin: 0 auto;
                padding: 1.5rem 1.2rem 3rem;
            }

            /* ===== Tab ===== */
            .tabs {
                display: flex;
                gap: 0.4rem;
                flex-wrap: wrap;
                margin-bottom: 1.4rem;
            }

            .tab {
                padding: 0.45rem 1rem;
                border-radius: 20px;
                border: 1.5px solid var(--border-mid);
                background: transparent;
                color: var(--text-muted);
                font-size: 0.88rem;
                cursor: pointer;
                transition: all 0.2s;
                white-space: nowrap;
            }

            .tab:hover {
                background: var(--card2);
                color: var(--text);
            }

            .tab.active {
                background: var(--accent);
                color: #f7f3ee;
                border-color: var(--accent);
            }

            /* ===== 输入区 ===== */
            .write-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 1.4rem;
                margin-bottom: 1.5rem;
            }

            .write-type-label {
                font-size: 0.85rem;
                color: var(--text-muted);
                margin-bottom: 0.7rem;
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .write-textarea {
                width: 100%;
                min-height: 110px;
                padding: 0.9rem 1rem;
                border: 1px solid var(--border-mid);
                border-radius: 10px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.95rem;
                line-height: 1.7;
                resize: vertical;
                outline: none;
                font-family: inherit;
                transition: border-color 0.2s;
            }

            .write-textarea:focus {
                border-color: var(--accent);
            }
            .write-textarea::placeholder {
                color: var(--text-muted);
            }

            .insight-wrap {
                margin-top: 0.8rem;
                display: none;
            }

            .book-fields {
                display: none;
                margin-bottom: 0.9rem;
            }

            .book-field-row {
                display: flex;
                gap: 0.6rem;
                align-items: center;
            }

            .book-field-label {
                font-size: 0.8rem;
                color: var(--text-muted);
                margin-bottom: 0.35rem;
            }

            .book-input {
                flex: 1;
                padding: 0.45rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.85rem;
                outline: none;
                font-family: inherit;
                transition: border-color 0.2s;
            }

            .book-input:focus {
                border-color: var(--accent);
            }

            .book-status-select {
                padding: 0.45rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.85rem;
                outline: none;
                font-family: inherit;
                cursor: pointer;
                transition: border-color 0.2s;
            }

            .book-status-select:focus {
                border-color: var(--accent);
            }

            .book-status-tag {
                display: inline-flex;
                align-items: center;
                gap: 0.2rem;
                font-size: 0.78rem;
                padding: 0.18rem 0.55rem;
                border-radius: 10px;
                font-weight: 500;
            }

            .note-book {
                margin-top: 0.6rem;
                font-size: 0.84rem;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 0.5rem;
                flex-wrap: wrap;
            }

            .note-book-name {
                font-weight: 500;
            }

            .insight-label {
                font-size: 0.8rem;
                color: var(--text-muted);
                margin-bottom: 0.4rem;
            }

            .write-actions {
                display: flex;
                justify-content: flex-end;
                margin-top: 1rem;
                gap: 0.6rem;
                align-items: center;
            }

            .save-status {
                font-size: 0.82rem;
                color: var(--text-muted);
            }

            .save-status.ok {
                color: #7a9e6b;
            }
            .save-status.err {
                color: #b85c5c;
            }

            .save-btn {
                padding: 0.55rem 1.4rem;
                background: var(--accent);
                color: #f7f3ee;
                border: none;
                border-radius: 10px;
                font-size: 0.9rem;
                cursor: pointer;
                font-weight: 500;
                transition: opacity 0.2s;
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .save-btn:hover {
                opacity: 0.85;
            }
            .save-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* ===== 历史卡片 ===== */
            .history-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 1rem;
            }

            .history-title {
                font-size: 0.9rem;
                color: var(--text-muted);
                font-weight: 500;
            }

            .filter-tabs {
                display: flex;
                gap: 0.3rem;
                flex-wrap: wrap;
            }

            .filter-btn {
                padding: 0.25rem 0.7rem;
                border-radius: 14px;
                border: 1px solid var(--border-mid);
                background: transparent;
                color: var(--text-muted);
                font-size: 0.78rem;
                cursor: pointer;
                transition: all 0.15s;
            }

            .filter-btn:hover {
                background: var(--card2);
            }
            .filter-btn.active {
                background: var(--accent);
                color: #f7f3ee;
                border-color: var(--accent);
            }

            .cards-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1rem;
            }

            .note-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 1.1rem 1.2rem;
                position: relative;
                transition: box-shadow 0.2s;
            }

            .note-card:hover {
                box-shadow: 0 4px 16px var(--shadow);
            }

            .search-wrap {
                position: relative;
                margin-bottom: 1rem;
            }

            .search-input {
                width: 100%;
                padding: 0.55rem 2.2rem 0.55rem 1rem;
                border: 1px solid rgba(139, 115, 85, 0.32);
                border-radius: 10px;
                background: #f7f3ee;
                color: #5c4e38;
                font-size: 0.85rem;
                outline: none;
                font-family: inherit;
                transition: border-color 0.2s;
            }

            .search-input:focus {
                border-color: var(--accent);
            }

            .search-input::placeholder {
                color: var(--text-muted);
            }

            .search-clear {
                position: absolute;
                right: 0.55rem;
                top: 50%;
                transform: translateY(-50%);
                background: transparent;
                border: none;
                color: var(--text-muted);
                cursor: pointer;
                font-size: 1rem;
                padding: 0.2rem 0.3rem;
                border-radius: 4px;
                display: none;
                line-height: 1;
            }

            .search-clear:hover {
                color: var(--text);
            }

            .note-card-top {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 0.7rem;
            }

            .note-type-badge {
                display: flex;
                align-items: center;
                gap: 0.3rem;
                font-size: 0.78rem;
                color: var(--text-muted);
                background: var(--card2);
                padding: 0.2rem 0.6rem;
                border-radius: 10px;
            }

            .note-date {
                font-size: 0.74rem;
                color: var(--text-muted);
            }

            .note-content {
                font-size: 0.9rem;
                color: var(--text);
                line-height: 1.65;
                white-space: pre-wrap;
                word-break: break-word;
            }

            .note-insight {
                margin-top: 0.7rem;
                padding-top: 0.7rem;
                border-top: 1px dashed var(--border-mid);
                font-size: 0.82rem;
                color: var(--text-muted);
                line-height: 1.6;
            }

            .note-insight-label {
                font-size: 0.74rem;
                color: var(--accent-light);
                margin-bottom: 0.2rem;
            }

            /* ===== 卡片操作按钮 ===== */
            .note-card-actions {
                display: flex;
                align-items: center;
                gap: 0.15rem;
            }

            .card-act-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                background: transparent;
                border: none;
                border-radius: 4px;
                color: var(--text-muted);
                cursor: pointer;
                font-size: 0.78rem;
                padding: 0.15rem 0.3rem;
                transition: all 0.2s;
                font-family: inherit;
            }

            .card-edit-btn:hover {
                color: var(--accent);
            }

            .card-del-btn:hover {
                color: #b85c5c;
            }

            /* ===== 卡片编辑模式 ===== */
            .card-edit-textarea {
                width: 100%;
                min-height: 80px;
                padding: 0.7rem 0.8rem;
                border: 1px solid var(--border-mid);
                border-radius: 10px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.9rem;
                line-height: 1.7;
                resize: vertical;
                outline: none;
                font-family: inherit;
                margin-bottom: 0.5rem;
            }

            .card-edit-textarea:focus {
                border-color: var(--accent);
            }

            .card-edit-input {
                width: 100%;
                padding: 0.45rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.85rem;
                outline: none;
                font-family: inherit;
                margin-bottom: 0.5rem;
            }

            .card-edit-input:focus {
                border-color: var(--accent);
            }

            .card-edit-select {
                padding: 0.45rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.85rem;
                outline: none;
                font-family: inherit;
                cursor: pointer;
                margin-bottom: 0.5rem;
            }

            .card-edit-select:focus {
                border-color: var(--accent);
            }

            .card-edit-label {
                font-size: 0.78rem;
                color: var(--text-muted);
                margin-bottom: 0.3rem;
            }

            .card-edit-actions {
                display: flex;
                justify-content: flex-end;
                gap: 0.5rem;
                margin-top: 0.5rem;
            }

            .card-edit-save {
                min-width: 44px;
                min-height: 44px;
                padding: 0.4rem 1rem;
                background: var(--accent);
                color: #f7f3ee;
                border: none;
                border-radius: 8px;
                font-size: 0.85rem;
                cursor: pointer;
                font-weight: 500;
                font-family: inherit;
                transition: opacity 0.2s;
            }

            .card-edit-save:hover { opacity: 0.85; }
            .card-edit-save:disabled { opacity: 0.5; cursor: not-allowed; }

            .card-edit-cancel {
                min-width: 44px;
                min-height: 44px;
                padding: 0.4rem 1rem;
                background: transparent;
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                color: var(--text-muted);
                font-size: 0.85rem;
                cursor: pointer;
                font-family: inherit;
                transition: all 0.2s;
            }

            .card-edit-cancel:hover {
                background: var(--card2);
                color: var(--text);
            }

            .card-inline-err {
                font-size: 0.76rem;
                color: #b85c5c;
                margin-top: 0.4rem;
            }

            .empty-tip {
                text-align: center;
                color: var(--text-muted);
                font-size: 0.9rem;
                padding: 3rem 1rem;
            }

            .empty-icon {
                font-size: 2.5rem;
                display: block;
                margin-bottom: 0.8rem;
            }

            .loading-tip {
                text-align: center;
                color: var(--text-muted);
                font-size: 0.85rem;
                padding: 2rem;
            }

            /* ===== 手账装饰线 ===== */
            .divider {
                border: none;
                border-top: 1px dashed var(--border-mid);
                margin: 1.5rem 0;
            }

            /* ===== 响应式 ===== */
            @media (max-width: 768px) {
                .config-bar {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 0.5rem;
                }
                .config-input {
                    min-width: unset;
                    width: 100%;
                }
                .cards-grid {
                    grid-template-columns: 1fr;
                }
                .header {
                    padding: 0.8rem 1rem;
                }
                .main-content {
                    padding: 1rem 0.8rem 3rem;
                }
                .tabs {
                    gap: 0.3rem;
                }
                .tab {
                    padding: 0.4rem 0.8rem;
                    font-size: 0.82rem;
                }
                .lock-card {
                    width: 88vw;
                    padding: 2.6rem 1.8rem;
                }
                .lock-title {
                    font-size: 1.7rem;
                }
            }
        </style>
    </head>
    <body>
        <!-- ===== 密码锁 ===== -->
        <div id="lock-screen">
            <div class="lock-card">
                <div class="lock-botanical">
                    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 4V40" stroke="#8B7355" stroke-width="1" stroke-linecap="round" />
                        <path d="M22 16C26 12 32 10 36 12" stroke="#8B7355" stroke-width="0.9" stroke-linecap="round" />
                        <path d="M22 22C18 18 12 16 8 18" stroke="#8B7355" stroke-width="0.9" stroke-linecap="round" />
                        <path d="M22 28C26 24 30 22 34 24" stroke="#8B7355" stroke-width="0.8" stroke-linecap="round" />
                        <path d="M22 10C20 6 16 2 12 4" stroke="#8B7355" stroke-width="0.7" stroke-linecap="round" />
                    </svg>
                </div>
                <h1 class="lock-title">拾光</h1>
                <p class="lock-sub">A quiet place for your thoughts</p>
                <div class="lock-divider"></div>
                <input
                    class="lock-input"
                    type="password"
                    id="pwd-input"
                    placeholder="请输入密码"
                    maxlength="20"
                    autocomplete="current-password"
                />
                <button class="lock-btn" onclick="tryUnlock()">进 入</button>
                <p class="lock-error" id="lock-err"></p>
            </div>
        </div>

        <!-- ===== 主应用 ===== -->
        <div id="app">
            <!-- 顶部标题栏 -->
            <header class="header">
                <span class="header-title">🌿 我的手账</span>
                <div class="header-actions">
                    <button class="lock-exit" onclick="lockApp()">🔒 锁定</button>
                </div>
            </header>

            <!-- Notion 配置 -->
            <div class="config-bar">
                <span class="config-label">Notion Token</span>
                <input class="config-input" type="password" id="notion-token" placeholder="secret_xxxxxxxx" />
                <span class="config-label">Database ID</span>
                <input class="config-input" id="notion-db" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
                <span class="config-status" id="notion-status">未连接</span>
                <button class="lock-exit" onclick="testNotion()">测试连接</button>
            </div>

            <div class="main-content">
                <!-- 类型 Tab -->
                <div class="tabs" id="type-tabs">
                    <button class="tab active" data-type="灵感" onclick="setTab(this)">💡 灵感</button>
                    <button class="tab" data-type="句子" onclick="setTab(this)">📖 句子</button>
                    <button class="tab" data-type="烦恼" onclick="setTab(this)">🌧️ 烦恼</button>
                    <button class="tab" data-type="摘录" onclick="setTab(this)">🤔 摘录</button>
                    <button class="tab" data-type="目标" onclick="setTab(this)">🎯 目标</button>
                    <button class="tab" data-type="开心" onclick="setTab(this)">🌸 开心</button>
                    <button class="tab" data-type="书单" onclick="setTab(this)">📚 书单</button>
                </div>

                <!-- 写作区 -->
                <div class="write-card">
                    <div class="write-type-label" id="write-label">💡 记录一个灵感</div>
                    <div class="book-fields" id="book-fields">
                        <!-- <div class="book-field-label">📚 书名</div> -->
                        <div class="book-field-row">
                            <input class="book-input" id="write-book-name" type="text" placeholder="输入书名…" />
                            <select class="book-status-select" id="write-book-status">
                                <option value="想读">想读</option>
                                <option value="在读">在读</option>
                                <option value="读完">读完</option>
                            </select>
                        </div>
                    </div>
                    <textarea class="write-textarea" id="write-content" placeholder="今天有什么想说的……"></textarea>
                    <div class="insight-wrap" id="insight-wrap">
                        <div class="insight-label">✍️ 我的感悟</div>
                        <textarea
                            class="write-textarea"
                            id="write-insight"
                            placeholder="读完之后，心里有什么感想……"
                            style="min-height: 70px"
                        ></textarea>
                    </div>
                    <div class="write-actions">
                        <span class="save-status" id="save-status"></span>
                        <button class="save-btn" id="save-btn" onclick="saveNote()">保存 ✦</button>
                    </div>
                </div>

                <hr class="divider" />

                <!-- 历史记录 -->
                <div class="history-header">
                    <span class="history-title">历史记录</span>
                    <div class="filter-tabs" id="filter-tabs">
                        <button class="filter-btn active" data-filter="全部" onclick="setFilter(this)">全部</button>
                        <button class="filter-btn" data-filter="灵感" onclick="setFilter(this)">💡</button>
                        <button class="filter-btn" data-filter="句子" onclick="setFilter(this)">📖</button>
                        <button class="filter-btn" data-filter="烦恼" onclick="setFilter(this)">🌧️</button>
                        <button class="filter-btn" data-filter="摘录" onclick="setFilter(this)">🤔</button>
                        <button class="filter-btn" data-filter="目标" onclick="setFilter(this)">🎯</button>
                        <button class="filter-btn" data-filter="开心" onclick="setFilter(this)">🌸</button>
                        <button class="filter-btn" data-filter="书单" onclick="setFilter(this)">📚</button>
                    </div>
                </div>

                <div class="search-wrap">
                    <input class="search-input" id="search-input" type="text" placeholder="搜索内容或感悟… 🔍" />
                    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
                </div>

                <div id="cards-area">
                    <div class="loading-tip">请先配置 Notion Token 和 Database ID，点击「测试连接」加载历史记录 🌿</div>
                </div>
            </div>
        </div>

        <script>
            // ===== 密码（可改）=====
            const CORRECT_PWD = "1234";

            // ===== 类型配置 =====
            const TYPE_MAP = {
                灵感: {emoji: "💡", hint: "记录一个灵感"},
                句子: {emoji: "📖", hint: "抄下一句喜欢的句子"},
                烦恼: {emoji: "🌧️", hint: "说说让你烦恼的事"},
                摘录: {emoji: "🤔", hint: "摘录一段值得回味的文字"},
                目标: {emoji: "🎯", hint: "写下你的目标"},
                开心: {emoji: "🌸", hint: "记录一个开心时刻"},
                书单: {emoji: "📚", hint: "加入一本想读的书"},
            };

            const BOOK_STATUS = {
                想读: {emoji: "🌱", color: "#8B7355"},
                在读: {emoji: "📖", color: "#5C7A9E"},
                读完: {emoji: "✅", color: "#6B8E5A"},
            };

            let currentType = "灵感";
            let currentFilter = "全部";
            let currentSearch = "";
            let allNotes = [];

            // ===== 密码锁 =====
            document.getElementById("pwd-input").addEventListener("keydown", (e) => {
                if (e.key === "Enter") tryUnlock();
            });

            function tryUnlock() {
                const val = document.getElementById("pwd-input").value;
                if (val === CORRECT_PWD) {
                    document.getElementById("lock-screen").style.display = "none";
                    document.getElementById("app").style.display = "block";
                    loadConfig();
                } else {
                    document.getElementById("lock-err").textContent = "密码不对哦 🔒";
                    document.getElementById("pwd-input").value = "";
                    document.getElementById("pwd-input").focus();
                }
            }

            function lockApp() {
                document.getElementById("app").style.display = "none";
                document.getElementById("lock-screen").style.display = "flex";
                document.getElementById("pwd-input").value = "";
                document.getElementById("lock-err").textContent = "";
            }

            // ===== 配置持久化 =====
            function loadConfig() {
                document.getElementById("notion-token").value = localStorage.getItem("notion_token") || "";
                document.getElementById("notion-db").value = localStorage.getItem("notion_db") || "";
                if (localStorage.getItem("notion_token") && localStorage.getItem("notion_db")) {
                    testNotion();
                }
            }

            function saveConfig() {
                localStorage.setItem("notion_token", document.getElementById("notion-token").value.trim());
                localStorage.setItem("notion_db", document.getElementById("notion-db").value.trim());
            }

            document.getElementById("notion-token").addEventListener("input", saveConfig);
            document.getElementById("notion-db").addEventListener("input", saveConfig);

            // ===== Tab =====
            function setTab(btn) {
                document.querySelectorAll("#type-tabs .tab").forEach((t) => t.classList.remove("active"));
                btn.classList.add("active");
                currentType = btn.dataset.type;
                const info = TYPE_MAP[currentType];
                document.getElementById("write-label").textContent = info.emoji + " " + info.hint;
                document.getElementById("write-content").placeholder = "今天有什么想说的……";
                document.getElementById("insight-wrap").style.display = currentType === "摘录" ? "block" : "none";
                document.getElementById("book-fields").style.display = currentType === "书单" ? "block" : "none";
            }

            function setFilter(btn) {
                document.querySelectorAll("#filter-tabs .filter-btn").forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderCards();
            }

            document.getElementById("search-input").addEventListener("input", (e) => {
                currentSearch = e.target.value.trim();
                document.getElementById("search-clear").style.display = currentSearch ? "block" : "none";
                renderCards();
            });

            function clearSearch() {
                document.getElementById("search-input").value = "";
                currentSearch = "";
                document.getElementById("search-clear").style.display = "none";
                document.getElementById("search-input").focus();
                renderCards();
            }

            // ===== Notion API =====
            function getHeaders() {
                return {
                    Authorization: "Bearer " + document.getElementById("notion-token").value.trim(),
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json",
                };
            }

            function getProxy(url) {
                return "https://notion-proxy.vercel.app/api?url=" + encodeURIComponent(url);
            }

            async function testNotion() {
                const token = document.getElementById("notion-token").value.trim();
                const db = document.getElementById("notion-db").value.trim();
                const statusEl = document.getElementById("notion-status");

                if (!token || !db) {
                    statusEl.textContent = "请先填写 Token 和 Database ID";
                    statusEl.className = "config-status err";
                    return;
                }

                statusEl.textContent = "连接中…";
                statusEl.className = "config-status";

                try {
                    const data = await fetchAllNotes(db);
                    statusEl.textContent = "✓ 连接成功";
                    statusEl.className = "config-status ok";
                    parseAndSave(data);
                    renderCards();
                } catch (e) {
                    statusEl.textContent = "✗ 连接失败";
                    statusEl.className = "config-status err";
                }
            }

            function notionQuery(dbId, startCursor) {
                const body = {page_size: 100, sorts: [{timestamp: "created_time", direction: "descending"}]};
                if (startCursor) body.start_cursor = startCursor;

                return fetch("https://shiguang-proxy.hazel3248627535.workers.dev/v1/databases/" + dbId + "/query", {
                    method: "POST",
                    headers: getHeaders(),
                    body: JSON.stringify(body),
                });
            }

            async function fetchAllNotes(dbId) {
                let results = [];
                let cursor = undefined;
                do {
                    const res = await notionQuery(dbId, cursor);
                    if (!res.ok) throw new Error("query failed: " + res.status);
                    const data = await res.json();
                    results = results.concat(data.results || []);
                    cursor = data.has_more ? data.next_cursor : undefined;
                } while (cursor);
                return { results };
            }

            async function loadNotes() {
                const db = document.getElementById("notion-db").value.trim();
                if (!db) return;

                document.getElementById("cards-area").innerHTML = '<div class="loading-tip">加载中… 🌿</div>';

                try {
                    const data = await fetchAllNotes(db);
                    parseAndSave(data);
                    renderCards();
                    document.getElementById("notion-status").textContent = "✓ 已连接";
                    document.getElementById("notion-status").className = "config-status ok";
                } catch (e) {
                    document.getElementById("cards-area").innerHTML =
                        '<div class="loading-tip">加载失败，请检查配置 🌧️</div>';
                }
            }

            function parseAndSave(data) {
                allNotes = (data.results || []).map((page) => {
                    const props = page.properties || {};
                    const getText = (key) => {
                        const p = props[key];
                        if (!p) return "";
                        if (p.rich_text) return p.rich_text.map((r) => r.plain_text).join("");
                        if (p.title) return p.title.map((r) => r.plain_text).join("");
                        if (p.select) return p.select?.name || "";
                        return "";
                    };
                    return {
                        id: page.id,
                        type: getText("类型") || getText("Type"),
                        content: getText("内容") || getText("Content"),
                        insight: getText("感悟") || getText("Insight"),
                        bookName: getText("书名") || getText("Book"),
                        bookStatus: getText("状态") || getText("Status"),
                        date: page.created_time ? page.created_time.slice(0, 10) : "",
                    };
                });
            }

            // ===== 渲染历史卡片 =====
            function renderCards() {
                const area = document.getElementById("cards-area");
                let filtered = currentFilter === "全部" ? allNotes : allNotes.filter((n) => n.type === currentFilter);

                if (currentSearch) {
                    const q = currentSearch.toLowerCase();
                    filtered = filtered.filter(
                        (n) =>
                            (n.content || "").toLowerCase().includes(q) ||
                            (n.insight || "").toLowerCase().includes(q) ||
                            (n.bookName || "").toLowerCase().includes(q)
                    );
                }

                if (filtered.length === 0) {
                    area.innerHTML = currentSearch
                        ? '<div class="empty-tip"><span class="empty-icon">🌿</span>没有找到相关记录 🌿</div>'
                        : '<div class="empty-tip"><span class="empty-icon">🌱</span>还没有记录，来写第一条吧~</div>';
                    return;
                }

                area.innerHTML = '<div class="cards-grid">' + filtered.map((n) => noteCardHTML(n)).join("") + "</div>";
            }

            function noteCardHTML(n) {
                const info = TYPE_MAP[n.type] || {emoji: "📝"};
                const insightHTML = n.insight
                    ? `<div class="note-insight"><div class="note-insight-label">✍️ 我的感悟</div>${escHtml(
                          n.insight
                      )}</div>`
                    : "";

                let bookHTML = "";
                if (n.type === "书单" && (n.bookName || n.bookStatus)) {
                    const st = BOOK_STATUS[n.bookStatus] || {};
                    bookHTML = `<div class="note-book">
                        ${n.bookName ? `<span class="note-book-name">📚 ${escHtml(n.bookName)}</span>` : ""}
                        ${
                            n.bookStatus
                                ? `<span class="book-status-tag" style="background:${st.color || "#8B7355"}18;color:${
                                      st.color || "#8B7355"
                                  }">${st.emoji || ""} ${n.bookStatus}</span>`
                                : ""
                        }
                    </div>`;
                }

                return `
      <div class="note-card" data-id="${n.id}">
        <div class="note-card-top">
          <span class="note-type-badge">${info.emoji} ${n.type}</span>
          <div class="note-card-actions">
            <button class="card-act-btn card-edit-btn" onclick="startEdit('${n.id}')" title="编辑">✎</button>
            <button class="card-act-btn card-del-btn" onclick="deleteNote('${n.id}', this)" title="删除">✕</button>
            <span class="note-date">${n.date}</span>
          </div>
        </div>
        <div class="note-content">${escHtml(n.content)}</div>
        ${bookHTML}
        ${insightHTML}
      </div>`;
            }

            function escHtml(s) {
                return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
            }

            // ===== 卡片编辑 =====
            function editCardHTML(n) {
                const info = TYPE_MAP[n.type] || {emoji: "📝"};
                let extra = "";
                if (n.type === "书单") {
                    extra = `
                <div class="card-edit-label">📚 书名</div>
                <input class="card-edit-input" id="edit-book-${n.id}" placeholder="书名…" />
                <div class="card-edit-label">状态</div>
                <select class="card-edit-select" id="edit-status-${n.id}">
                  <option value="想读">想读</option>
                  <option value="在读">在读</option>
                  <option value="读完">读完</option>
                </select>`;
                } else if (n.type === "摘录") {
                    extra = `
                <div class="card-edit-label">✍️ 我的感悟</div>
                <textarea class="card-edit-textarea" id="edit-insight-${n.id}" style="min-height:60px"></textarea>`;
                }
                return `
          <div class="note-card-top">
            <span class="note-type-badge">${info.emoji} ${n.type}</span>
            <span class="note-date">${n.date}</span>
          </div>
          <textarea class="card-edit-textarea" id="edit-content-${n.id}"></textarea>
          ${extra}
          <div class="card-edit-actions">
            <span class="card-inline-err" id="edit-err-${n.id}"></span>
            <button class="card-edit-cancel" onclick="cancelEdit('${n.id}')">取消</button>
            <button class="card-edit-save" id="edit-save-${n.id}" onclick="saveEdit('${n.id}')">保存</button>
          </div>`;
            }

            function startEdit(id) {
                const note = allNotes.find((n) => n.id === id);
                if (!note) return;
                const card = document.querySelector(`.note-card[data-id="${id}"]`);
                if (!card) return;
                card.setAttribute("data-editing", "1");
                card.innerHTML = editCardHTML(note);
                document.getElementById("edit-content-" + id).value = note.content;
                if (note.type === "书单") {
                    document.getElementById("edit-book-" + id).value = note.bookName || "";
                    document.getElementById("edit-status-" + id).value = note.bookStatus || "想读";
                }
                if (note.type === "摘录") {
                    document.getElementById("edit-insight-" + id).value = note.insight || "";
                }
                const ta = card.querySelector("textarea");
                if (ta) ta.focus();
            }

            function cancelEdit(id) {
                const note = allNotes.find((n) => n.id === id);
                if (!note) return;
                const card = document.querySelector(`.note-card[data-id="${id}"]`);
                if (!card) return;
                card.removeAttribute("data-editing");
                card.outerHTML = noteCardHTML(note);
            }

            async function saveEdit(id) {
                const note = allNotes.find((n) => n.id === id);
                if (!note) return;
                const content = document.getElementById("edit-content-" + id).value.trim();
                if (!content) return;

                const saveBtn = document.getElementById("edit-save-" + id);
                const errEl = document.getElementById("edit-err-" + id);
                if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "…"; }
                if (errEl) errEl.textContent = "";

                const props = { "内容": { title: [{ text: { content } }] } };

                if (note.type === "摘录") {
                    const el = document.getElementById("edit-insight-" + id);
                    props["感悟"] = { rich_text: [{ text: { content: el ? el.value.trim() : "" } }] };
                }
                if (note.type === "书单") {
                    const nEl = document.getElementById("edit-book-" + id);
                    const sEl = document.getElementById("edit-status-" + id);
                    props["书名"] = { rich_text: [{ text: { content: nEl ? nEl.value.trim() : "" } }] };
                    props["状态"] = { select: { name: sEl ? sEl.value : "想读" } };
                }

                try {
                    const res = await fetch("https://shiguang-proxy.hazel3248627535.workers.dev/v1/pages/" + id, {
                        method: "PATCH",
                        headers: getHeaders(),
                        body: JSON.stringify({ properties: props }),
                    });
                    if (res.ok) {
                        note.content = content;
                        if (note.type === "摘录") {
                            const el = document.getElementById("edit-insight-" + id);
                            note.insight = el ? el.value.trim() : "";
                        }
                        if (note.type === "书单") {
                            const nEl = document.getElementById("edit-book-" + id);
                            const sEl = document.getElementById("edit-status-" + id);
                            note.bookName = nEl ? nEl.value.trim() : "";
                            note.bookStatus = sEl ? sEl.value : "想读";
                        }
                        const card = document.querySelector(`.note-card[data-id="${id}"]`);
                        if (card) {
                            card.removeAttribute("data-editing");
                            card.outerHTML = noteCardHTML(note);
                        }
                    } else {
                        const err = await res.json();
                        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "保存"; }
                        if (errEl) errEl.textContent = "✗ 保存失败：" + (err.message || res.status);
                    }
                } catch (e) {
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "保存"; }
                    if (errEl) errEl.textContent = "✗ 网络错误";
                }
            }

            // ===== 保存笔记 =====
            async function saveNote() {
                const token = document.getElementById("notion-token").value.trim();
                const db = document.getElementById("notion-db").value.trim();
                const content = document.getElementById("write-content").value.trim();
                const insight = document.getElementById("write-insight").value.trim();
                const bookName = document.getElementById("write-book-name").value.trim();
                const bookStatus = document.getElementById("write-book-status").value;
                const btn = document.getElementById("save-btn");
                const statusEl = document.getElementById("save-status");

                if (!token || !db) {
                    statusEl.textContent = "请先配置 Notion ⚙️";
                    statusEl.className = "save-status err";
                    return;
                }
                if (!content) {
                    statusEl.textContent = "还没写内容哦 🌿";
                    statusEl.className = "save-status err";
                    return;
                }

                btn.disabled = true;
                btn.textContent = "保存中…";
                statusEl.textContent = "";

                const props = {
                    内容: {title: [{text: {content}}]},
                    类型: {select: {name: currentType}},
                };

                if (currentType === "摘录" && insight) {
                    props["感悟"] = {rich_text: [{text: {content: insight}}]};
                }

                if (currentType === "书单") {
                    if (bookName) props["书名"] = {rich_text: [{text: {content: bookName}}]};
                    props["状态"] = {select: {name: bookStatus}};
                }

                try {
                    const res = await fetch("https://shiguang-proxy.hazel3248627535.workers.dev/v1/pages", {
                        method: "POST",
                        headers: getHeaders(),
                        body: JSON.stringify({parent: {database_id: db}, properties: props}),
                    });

                    if (res.ok) {
                        const page = await res.json();
                        const newNote = {
                            id: page.id,
                            type: currentType,
                            content,
                            insight: currentType === "摘录" ? insight : "",
                            bookName: currentType === "书单" ? bookName : "",
                            bookStatus: currentType === "书单" ? bookStatus : "",
                            date: new Date().toISOString().slice(0, 10),
                        };
                        allNotes.unshift(newNote);
                        renderCards();

                        document.getElementById("write-content").value = "";
                        document.getElementById("write-insight").value = "";
                        document.getElementById("write-book-name").value = "";
                        document.getElementById("write-book-status").value = "想读";
                        statusEl.textContent = "✓ 已保存到 Notion";
                        statusEl.className = "save-status ok";
                        setTimeout(() => (statusEl.textContent = ""), 3000);
                    } else {
                        const err = await res.json();
                        statusEl.textContent = "✗ 保存失败：" + (err.message || res.status);
                        statusEl.className = "save-status err";
                    }
                } catch (e) {
                    statusEl.textContent = "✗ 网络错误，请检查 CORS";
                    statusEl.className = "save-status err";
                }

                btn.disabled = false;
                btn.textContent = "保存 ✦";
            }

            // ===== 删除笔记 =====
            async function deleteNote(id, btnEl) {
                if (!confirm("确定删除这条记录吗？")) return;
                const token = document.getElementById("notion-token").value.trim();
                if (!token) return;

                btnEl.textContent = "…";

                const card = document.querySelector(`.note-card[data-id="${id}"]`);
                const oldErr = card ? card.querySelector(".card-inline-err") : null;
                if (oldErr) oldErr.remove();

                try {
                    const res = await fetch("https://shiguang-proxy.hazel3248627535.workers.dev/v1/pages/" + id, {
                        method: "PATCH",
                        headers: getHeaders(),
                        body: JSON.stringify({archived: true}),
                    });
                    if (res.ok) {
                        allNotes = allNotes.filter((n) => n.id !== id);
                        renderCards();
                    } else {
                        btnEl.textContent = "✕";
                        if (card) {
                            const errEl = document.createElement("div");
                            errEl.className = "card-inline-err";
                            errEl.textContent = "✗ 删除失败 (" + res.status + ")";
                            card.appendChild(errEl);
                        }
                    }
                } catch (e) {
                    btnEl.textContent = "✕";
                    if (card) {
                        const errEl = document.createElement("div");
                        errEl.className = "card-inline-err";
                        errEl.textContent = "✗ 网络错误";
                        card.appendChild(errEl);
                    }
                }
            }
        </script>
    </body>
</html>
