<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>拾光手账 🌿</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #f7f3ee;
                --card: #efe9df;
                --card2: #e8e0d3;
                --text: #5c4e38;
                --text-muted: #9a876b;
                --accent: #8b7355;
                --accent-light: #d4c4ad;
                --border: rgba(139, 115, 85, 0.18);
                --border-mid: rgba(139, 115, 85, 0.32);
                --shadow: rgba(92, 78, 56, 0.08);
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
                min-height: 100vh;
            }

            /* ===== 密码锁 ===== */
            #lock-screen {
                position: fixed;
                inset: 0;
                background: var(--bg);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }

            .lock-card {
                background: var(--card);
                border: 1px solid var(--border-mid);
                border-radius: 20px;
                padding: 3rem 2.5rem;
                width: 340px;
                text-align: center;
                box-shadow: 0 8px 32px var(--shadow);
            }

            .lock-icon {
                font-size: 2.8rem;
                margin-bottom: 1rem;
                display: block;
            }

            .lock-title {
                font-size: 1.25rem;
                font-weight: 600;
                color: var(--text);
                margin-bottom: 0.4rem;
            }

            .lock-sub {
                font-size: 0.85rem;
                color: var(--text-muted);
                margin-bottom: 1.8rem;
            }

            .lock-input {
                width: 100%;
                padding: 0.75rem 1rem;
                border: 1.5px solid var(--border-mid);
                border-radius: 10px;
                background: var(--bg);
                color: var(--text);
                font-size: 1rem;
                outline: none;
                text-align: center;
                letter-spacing: 4px;
                transition: border-color 0.2s;
                margin-bottom: 0.8rem;
            }

            .lock-input:focus {
                border-color: var(--accent);
            }

            .lock-btn {
                width: 100%;
                padding: 0.75rem;
                background: var(--accent);
                color: #f7f3ee;
                border: none;
                border-radius: 10px;
                font-size: 0.95rem;
                cursor: pointer;
                font-weight: 500;
                transition: opacity 0.2s;
            }

            .lock-btn:hover {
                opacity: 0.88;
            }

            .lock-error {
                font-size: 0.82rem;
                color: #b85c5c;
                margin-top: 0.6rem;
                min-height: 1.2em;
            }

            /* ===== 主界面 ===== */
            #app {
                display: none;
                min-height: 100vh;
            }

            .header {
                background: var(--card);
                border-bottom: 1px solid var(--border);
                padding: 0.9rem 1.5rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 100;
            }

            .header-title {
                font-size: 1.05rem;
                font-weight: 600;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .header-actions {
                display: flex;
                align-items: center;
                gap: 0.6rem;
            }

            .lock-exit {
                font-size: 0.8rem;
                color: var(--text-muted);
                cursor: pointer;
                padding: 0.3rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 8px;
                background: transparent;
                transition: all 0.2s;
            }
            .lock-exit:hover {
                background: var(--card2);
                color: var(--text);
            }

            /* ===== 配置区 ===== */
            .config-bar {
                background: var(--card);
                border-bottom: 1px solid var(--border);
                padding: 0.7rem 1.5rem;
                display: flex;
                gap: 0.8rem;
                align-items: center;
                flex-wrap: wrap;
            }

            .config-label {
                font-size: 0.78rem;
                color: var(--text-muted);
                white-space: nowrap;
            }

            .config-input {
                flex: 1;
                min-width: 160px;
                padding: 0.4rem 0.7rem;
                border: 1px solid var(--border-mid);
                border-radius: 7px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.82rem;
                outline: none;
            }

            .config-input:focus {
                border-color: var(--accent);
            }

            .config-status {
                font-size: 0.76rem;
                color: var(--text-muted);
                white-space: nowrap;
            }

            .config-status.ok {
                color: #7a9e6b;
            }
            .config-status.err {
                color: #b85c5c;
            }

            /* ===== 主体 ===== */
            .main-content {
                max-width: 900px;
                margin: 0 auto;
                padding: 1.5rem 1.2rem 3rem;
            }

            /* ===== Tab ===== */
            .tabs {
                display: flex;
                gap: 0.4rem;
                flex-wrap: wrap;
                margin-bottom: 1.4rem;
            }

            .tab {
                padding: 0.45rem 1rem;
                border-radius: 20px;
                border: 1.5px solid var(--border-mid);
                background: transparent;
                color: var(--text-muted);
                font-size: 0.88rem;
                cursor: pointer;
                transition: all 0.2s;
                white-space: nowrap;
            }

            .tab:hover {
                background: var(--card2);
                color: var(--text);
            }

            .tab.active {
                background: var(--accent);
                color: #f7f3ee;
                border-color: var(--accent);
            }

            /* ===== 输入区 ===== */
            .write-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 1.4rem;
                margin-bottom: 1.5rem;
            }

            .write-type-label {
                font-size: 0.85rem;
                color: var(--text-muted);
                margin-bottom: 0.7rem;
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .write-textarea {
                width: 100%;
                min-height: 110px;
                padding: 0.9rem 1rem;
                border: 1px solid var(--border-mid);
                border-radius: 10px;
                background: var(--bg);
                color: var(--text);
                font-size: 0.95rem;
                line-height: 1.7;
                resize: vertical;
                outline: none;
                font-family: inherit;
                transition: border-color 0.2s;
            }

            .write-textarea:focus {
                border-color: var(--accent);
            }
            .write-textarea::placeholder {
                color: var(--text-muted);
            }

            .insight-wrap {
                margin-top: 0.8rem;
                display: none;
            }

            .insight-label {
                font-size: 0.8rem;
                color: var(--text-muted);
                margin-bottom: 0.4rem;
            }

            .write-actions {
                display: flex;
                justify-content: flex-end;
                margin-top: 1rem;
                gap: 0.6rem;
                align-items: center;
            }

            .save-status {
                font-size: 0.82rem;
                color: var(--text-muted);
            }

            .save-status.ok {
                color: #7a9e6b;
            }
            .save-status.err {
                color: #b85c5c;
            }

            .save-btn {
                padding: 0.55rem 1.4rem;
                background: var(--accent);
                color: #f7f3ee;
                border: none;
                border-radius: 10px;
                font-size: 0.9rem;
                cursor: pointer;
                font-weight: 500;
                transition: opacity 0.2s;
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .save-btn:hover {
                opacity: 0.85;
            }
            .save-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* ===== 历史卡片 ===== */
            .history-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 1rem;
            }

            .history-title {
                font-size: 0.9rem;
                color: var(--text-muted);
                font-weight: 500;
            }

            .filter-tabs {
                display: flex;
                gap: 0.3rem;
                flex-wrap: wrap;
            }

            .filter-btn {
                padding: 0.25rem 0.7rem;
                border-radius: 14px;
                border: 1px solid var(--border-mid);
                background: transparent;
                color: var(--text-muted);
                font-size: 0.78rem;
                cursor: pointer;
                transition: all 0.15s;
            }

            .filter-btn:hover {
                background: var(--card2);
            }
            .filter-btn.active {
                background: var(--accent);
                color: #f7f3ee;
                border-color: var(--accent);
            }

            .cards-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1rem;
            }

            .note-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 1.1rem 1.2rem;
                position: relative;
                transition: box-shadow 0.2s;
            }

            .note-card:hover {
                box-shadow: 0 4px 16px var(--shadow);
            }

            .note-card-top {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 0.7rem;
            }

            .note-type-badge {
                display: flex;
                align-items: center;
                gap: 0.3rem;
                font-size: 0.78rem;
                color: var(--text-muted);
                background: var(--card2);
                padding: 0.2rem 0.6rem;
                border-radius: 10px;
            }

            .note-date {
                font-size: 0.74rem;
                color: var(--text-muted);
            }

            .note-content {
                font-size: 0.9rem;
                color: var(--text);
                line-height: 1.65;
                white-space: pre-wrap;
                word-break: break-word;
            }

            .note-insight {
                margin-top: 0.7rem;
                padding-top: 0.7rem;
                border-top: 1px dashed var(--border-mid);
                font-size: 0.82rem;
                color: var(--text-muted);
                line-height: 1.6;
            }

            .note-insight-label {
                font-size: 0.74rem;
                color: var(--accent-light);
                margin-bottom: 0.2rem;
            }

            .note-delete {
                position: absolute;
                top: 0.8rem;
                right: 0.8rem;
                background: transparent;
                border: none;
                color: var(--text-muted);
                cursor: pointer;
                font-size: 1rem;
                opacity: 0;
                transition: opacity 0.15s;
                padding: 0.2rem;
                border-radius: 5px;
            }

            .note-card:hover .note-delete {
                opacity: 1;
            }
            .note-delete:hover {
                color: #b85c5c;
            }

            .empty-tip {
                text-align: center;
                color: var(--text-muted);
                font-size: 0.9rem;
                padding: 3rem 1rem;
            }

            .empty-icon {
                font-size: 2.5rem;
                display: block;
                margin-bottom: 0.8rem;
            }

            .loading-tip {
                text-align: center;
                color: var(--text-muted);
                font-size: 0.85rem;
                padding: 2rem;
            }

            /* ===== 手账装饰线 ===== */
            .divider {
                border: none;
                border-top: 1px dashed var(--border-mid);
                margin: 1.5rem 0;
            }

            /* ===== 响应式 ===== */
            @media (max-width: 768px) {
                .config-bar {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 0.5rem;
                }
                .config-input {
                    min-width: unset;
                    width: 100%;
                }
                .cards-grid {
                    grid-template-columns: 1fr;
                }
                .header {
                    padding: 0.8rem 1rem;
                }
                .main-content {
                    padding: 1rem 0.8rem 3rem;
                }
                .tabs {
                    gap: 0.3rem;
                }
                .tab {
                    padding: 0.4rem 0.8rem;
                    font-size: 0.82rem;
                }
                .lock-card {
                    width: 90vw;
                    padding: 2.2rem 1.5rem;
                }
            }
        </style>
    </head>
    <body>
        <!-- ===== 密码锁 ===== -->
        <div id="lock-screen">
            <div class="lock-card">
                <span class="lock-icon">🔒</span>
                <p class="lock-title">私密手账</p>
                <p class="lock-sub">这里只属于你 🌿</p>
                <input
                    class="lock-input"
                    type="password"
                    id="pwd-input"
                    placeholder="请输入密码"
                    maxlength="20"
                    autocomplete="current-password"
                />
                <button class="lock-btn" onclick="tryUnlock()">进入</button>
                <p class="lock-error" id="lock-err"></p>
            </div>
        </div>

        <!-- ===== 主应用 ===== -->
        <div id="app">
            <!-- 顶部标题栏 -->
            <header class="header">
                <span class="header-title">🌿 我的手账</span>
                <div class="header-actions">
                    <button class="lock-exit" onclick="lockApp()">🔒 锁定</button>
                </div>
            </header>

            <!-- Notion 配置 -->
            <div class="config-bar">
                <span class="config-label">Notion Token</span>
                <input class="config-input" type="password" id="notion-token" placeholder="secret_xxxxxxxx" />
                <span class="config-label">Database ID</span>
                <input class="config-input" id="notion-db" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
                <span class="config-status" id="notion-status">未连接</span>
                <button class="lock-exit" onclick="testNotion()">测试连接</button>
            </div>

            <div class="main-content">
                <!-- 类型 Tab -->
                <div class="tabs" id="type-tabs">
                    <button class="tab active" data-type="灵感" onclick="setTab(this)">💡 灵感</button>
                    <button class="tab" data-type="句子" onclick="setTab(this)">📖 句子</button>
                    <button class="tab" data-type="烦恼" onclick="setTab(this)">🌧️ 烦恼</button>
                    <button class="tab" data-type="摘录" onclick="setTab(this)">🤔 摘录</button>
                    <button class="tab" data-type="目标" onclick="setTab(this)">🎯 目标</button>
                    <button class="tab" data-type="开心" onclick="setTab(this)">🌸 开心</button>
                </div>

                <!-- 写作区 -->
                <div class="write-card">
                    <div class="write-type-label" id="write-label">💡 记录一个灵感</div>
                    <textarea class="write-textarea" id="write-content" placeholder="今天有什么想说的……"></textarea>
                    <div class="insight-wrap" id="insight-wrap">
                        <div class="insight-label">✍️ 我的感悟</div>
                        <textarea
                            class="write-textarea"
                            id="write-insight"
                            placeholder="读完之后，心里有什么感想……"
                            style="min-height: 70px"
                        ></textarea>
                    </div>
                    <div class="write-actions">
                        <span class="save-status" id="save-status"></span>
                        <button class="save-btn" id="save-btn" onclick="saveNote()">保存 ✦</button>
                    </div>
                </div>

                <hr class="divider" />

                <!-- 历史记录 -->
                <div class="history-header">
                    <span class="history-title">历史记录</span>
                    <div class="filter-tabs" id="filter-tabs">
                        <button class="filter-btn active" data-filter="全部" onclick="setFilter(this)">全部</button>
                        <button class="filter-btn" data-filter="灵感" onclick="setFilter(this)">💡</button>
                        <button class="filter-btn" data-filter="句子" onclick="setFilter(this)">📖</button>
                        <button class="filter-btn" data-filter="烦恼" onclick="setFilter(this)">🌧️</button>
                        <button class="filter-btn" data-filter="摘录" onclick="setFilter(this)">🤔</button>
                        <button class="filter-btn" data-filter="目标" onclick="setFilter(this)">🎯</button>
                        <button class="filter-btn" data-filter="开心" onclick="setFilter(this)">🌸</button>
                    </div>
                </div>

                <div id="cards-area">
                    <div class="loading-tip">请先配置 Notion Token 和 Database ID，点击「测试连接」加载历史记录 🌿</div>
                </div>
            </div>
        </div>

        <script>
            // ===== 密码（可改）=====
            const CORRECT_PWD = "1234";

            // ===== 类型配置 =====
            const TYPE_MAP = {
                灵感: {emoji: "💡", hint: "记录一个灵感"},
                句子: {emoji: "📖", hint: "抄下一句喜欢的句子"},
                烦恼: {emoji: "🌧️", hint: "说说让你烦恼的事"},
                摘录: {emoji: "🤔", hint: "摘录一段值得回味的文字"},
                目标: {emoji: "🎯", hint: "写下你的目标"},
                开心: {emoji: "🌸", hint: "记录一个开心时刻"},
            };

            let currentType = "灵感";
            let currentFilter = "全部";
            let allNotes = [];

            // ===== 密码锁 =====
            document.getElementById("pwd-input").addEventListener("keydown", (e) => {
                if (e.key === "Enter") tryUnlock();
            });

            function tryUnlock() {
                const val = document.getElementById("pwd-input").value;
                if (val === CORRECT_PWD) {
                    document.getElementById("lock-screen").style.display = "none";
                    document.getElementById("app").style.display = "block";
                    loadConfig();
                } else {
                    document.getElementById("lock-err").textContent = "密码不对哦 🔒";
                    document.getElementById("pwd-input").value = "";
                    document.getElementById("pwd-input").focus();
                }
            }

            function lockApp() {
                document.getElementById("app").style.display = "none";
                document.getElementById("lock-screen").style.display = "flex";
                document.getElementById("pwd-input").value = "";
                document.getElementById("lock-err").textContent = "";
            }

            // ===== 配置持久化 =====
            function loadConfig() {
                document.getElementById("notion-token").value = localStorage.getItem("notion_token") || "";
                document.getElementById("notion-db").value = localStorage.getItem("notion_db") || "";
                if (localStorage.getItem("notion_token") && localStorage.getItem("notion_db")) {
                    loadNotes();
                }
            }

            function saveConfig() {
                localStorage.setItem("notion_token", document.getElementById("notion-token").value.trim());
                localStorage.setItem("notion_db", document.getElementById("notion-db").value.trim());
            }

            document.getElementById("notion-token").addEventListener("input", saveConfig);
            document.getElementById("notion-db").addEventListener("input", saveConfig);

            // ===== Tab =====
            function setTab(btn) {
                document.querySelectorAll("#type-tabs .tab").forEach((t) => t.classList.remove("active"));
                btn.classList.add("active");
                currentType = btn.dataset.type;
                const info = TYPE_MAP[currentType];
                document.getElementById("write-label").textContent = info.emoji + " " + info.hint;
                document.getElementById("write-content").placeholder = "今天有什么想说的……";
                document.getElementById("insight-wrap").style.display = currentType === "摘录" ? "block" : "none";
            }

            function setFilter(btn) {
                document.querySelectorAll("#filter-tabs .filter-btn").forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = btn.dataset.filter;
                renderCards();
            }

            // ===== Notion API =====
            function getHeaders() {
                return {
                    Authorization: "Bearer " + document.getElementById("notion-token").value.trim(),
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json",
                };
            }

            function getProxy(url) {
                return "https://notion-proxy.vercel.app/api?url=" + encodeURIComponent(url);
            }

            async function testNotion() {
                const token = document.getElementById("notion-token").value.trim();
                const db = document.getElementById("notion-db").value.trim();
                const statusEl = document.getElementById("notion-status");

                if (!token || !db) {
                    statusEl.textContent = "请先填写 Token 和 Database ID";
                    statusEl.className = "config-status err";
                    return;
                }

                statusEl.textContent = "连接中…";
                statusEl.className = "config-status";

                try {
                    const res = await notionQuery(db);
                    if (res.ok) {
                        statusEl.textContent = "✓ 连接成功";
                        statusEl.className = "config-status ok";
                        const data = await res.json();
                        parseAndSave(data);
                        renderCards();
                    } else {
                        statusEl.textContent = "✗ 连接失败 (" + res.status + ")";
                        statusEl.className = "config-status err";
                    }
                } catch (e) {
                    statusEl.textContent = "✗ 网络错误";
                    statusEl.className = "config-status err";
                }
            }

            async function notionQuery(dbId, startCursor) {
                const body = {page_size: 100, sorts: [{timestamp: "created_time", direction: "descending"}]};
                if (startCursor) body.start_cursor = startCursor;

                return fetch("https://shiguang-proxy.hazel3248627535.workers.dev/v1/databases/" + dbId + "/query", {
                    method: "POST",
                    headers: getHeaders(),
                    body: JSON.stringify(body),
                });
            }

            async function loadNotes() {
                const db = document.getElementById("notion-db").value.trim();
                if (!db) return;

                document.getElementById("cards-area").innerHTML = '<div class="loading-tip">加载中… 🌿</div>';

                try {
                    const res = await notionQuery(db);
                    if (res.ok) {
                        const data = await res.json();
                        parseAndSave(data);
                        renderCards();
                        document.getElementById("notion-status").textContent = "✓ 已连接";
                        document.getElementById("notion-status").className = "config-status ok";
                    } else {
                        document.getElementById("cards-area").innerHTML =
                            '<div class="loading-tip">加载失败，请检查配置 🌧️</div>';
                    }
                } catch (e) {
                    document.getElementById("cards-area").innerHTML =
                        '<div class="loading-tip">网络错误，请稍后再试</div>';
                }
            }

            function parseAndSave(data) {
                allNotes = (data.results || []).map((page) => {
                    const props = page.properties || {};
                    const getText = (key) => {
                        const p = props[key];
                        if (!p) return "";
                        if (p.rich_text) return p.rich_text.map((r) => r.plain_text).join("");
                        if (p.title) return p.title.map((r) => r.plain_text).join("");
                        if (p.select) return p.select?.name || "";
                        return "";
                    };
                    return {
                        id: page.id,
                        type: getText("类型") || getText("Type"),
                        content: getText("内容") || getText("Content"),
                        insight: getText("感悟") || getText("Insight"),
                        date: page.created_time ? page.created_time.slice(0, 10) : "",
                    };
                });
            }

            // ===== 渲染历史卡片 =====
            function renderCards() {
                const area = document.getElementById("cards-area");
                const filtered = currentFilter === "全部" ? allNotes : allNotes.filter((n) => n.type === currentFilter);

                if (filtered.length === 0) {
                    area.innerHTML =
                        '<div class="empty-tip"><span class="empty-icon">🌱</span>还没有记录，来写第一条吧~</div>';
                    return;
                }

                area.innerHTML = '<div class="cards-grid">' + filtered.map((n) => noteCardHTML(n)).join("") + "</div>";
            }

            function noteCardHTML(n) {
                const info = TYPE_MAP[n.type] || {emoji: "📝"};
                const insightHTML = n.insight
                    ? `<div class="note-insight"><div class="note-insight-label">✍️ 我的感悟</div>${escHtml(
                          n.insight
                      )}</div>`
                    : "";
                return `
      <div class="note-card" data-id="${n.id}">
        <button class="note-delete" onclick="deleteNote('${n.id}', this)" title="删除">✕</button>
        <div class="note-card-top">
          <span class="note-type-badge">${info.emoji} ${n.type}</span>
          <span class="note-date">${n.date}</span>
        </div>
        <div class="note-content">${escHtml(n.content)}</div>
        ${insightHTML}
      </div>`;
            }

            function escHtml(s) {
                return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }

            // ===== 保存笔记 =====
            async function saveNote() {
                const token = document.getElementById("notion-token").value.trim();
                const db = document.getElementById("notion-db").value.trim();
                const content = document.getElementById("write-content").value.trim();
                const insight = document.getElementById("write-insight").value.trim();
                const btn = document.getElementById("save-btn");
                const statusEl = document.getElementById("save-status");

                if (!token || !db) {
                    statusEl.textContent = "请先配置 Notion ⚙️";
                    statusEl.className = "save-status err";
                    return;
                }
                if (!content) {
                    statusEl.textContent = "还没写内容哦 🌿";
                    statusEl.className = "save-status err";
                    return;
                }

                btn.disabled = true;
                btn.textContent = "保存中…";
                statusEl.textContent = "";

                const props = {
                    内容: {title: [{text: {content}}]},
                    类型: {select: {name: currentType}},
                };

                if (currentType === "摘录" && insight) {
                    props["感悟"] = {rich_text: [{text: {content: insight}}]};
                }

                try {
                    const res = await fetch("https://shiguang-proxy.hazel3248627535.workers.dev/v1/pages", {
                        method: "POST",
                        headers: getHeaders(),
                        body: JSON.stringify({parent: {database_id: db}, properties: props}),
                    });

                    if (res.ok) {
                        const page = await res.json();
                        const newNote = {
                            id: page.id,
                            type: currentType,
                            content,
                            insight: currentType === "摘录" ? insight : "",
                            date: new Date().toISOString().slice(0, 10),
                        };
                        allNotes.unshift(newNote);
                        renderCards();

                        document.getElementById("write-content").value = "";
                        document.getElementById("write-insight").value = "";
                        statusEl.textContent = "✓ 已保存到 Notion";
                        statusEl.className = "save-status ok";
                        setTimeout(() => (statusEl.textContent = ""), 3000);
                    } else {
                        const err = await res.json();
                        statusEl.textContent = "✗ 保存失败：" + (err.message || res.status);
                        statusEl.className = "save-status err";
                    }
                } catch (e) {
                    statusEl.textContent = "✗ 网络错误，请检查 CORS";
                    statusEl.className = "save-status err";
                }

                btn.disabled = false;
                btn.textContent = "保存 ✦";
            }

            // ===== 删除笔记 =====
            async function deleteNote(id, btnEl) {
                if (!confirm("确定删除这条记录吗？")) return;
                const token = document.getElementById("notion-token").value.trim();
                if (!token) return;

                btnEl.textContent = "…";

                try {
                    await fetch("https://shiguang-proxy.hazel3248627535.workers.dev/v1/pages/" + id, {
                        method: "PATCH",
                        headers: getHeaders(),
                        body: JSON.stringify({archived: true}),
                    });
                    allNotes = allNotes.filter((n) => n.id !== id);
                    renderCards();
                } catch (e) {
                    btnEl.textContent = "✕";
                }
            }
        </script>
    </body>
</html>
